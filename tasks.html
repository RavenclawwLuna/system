<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Daily To-Do Tasks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
        }
        body {
            background: #e6f4ff;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b8e0ff' fill-opacity='0.4'%3E%3Cpath d='M30 30c0-3.3-2.7-6-6-6s-6 2.7-6 6 2.7 6 6 6 6-2.7 6-6zm18 0c0-3.3-2.7-6-6-6s-6 2.7-6 6 2.7 6 6 6 6-2.7 6-6zm-36 0c0-3.3-2.7-6-6-6s-6 2.7-6 6 2.7 6 6 6 6-2.7 6-6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            padding: 2rem;
            max-width: 700px;
            margin: 0 auto;
        }
        .flower-deco {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        h1 {
            color: #2b6cb0;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
        }
        .back-home {
            display: inline-block;
            background: #b8e0ff;
            color: #1a5276;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            text-decoration: none;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px #c0e0fb;
        }
        .lock-toggle-wrap {
            margin-bottom: 1rem;
            text-align: right;
        }
        #lockToggle {
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 12px;
            background: #74c2f2;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .edit-section {
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #c0e0fb;
            border-radius: 14px;
            margin-bottom: 0.7rem;
            font-size: 1rem;
            background: #f7fbff;
        }
        .btn-add {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 14px;
            background: #74c2f2;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .task-list {
            max-height: 350px;
            overflow-y: auto;
        }
        .list-item {
            background: #f0f8ff;
            padding: 0.9rem;
            border-radius: 14px;
            margin-bottom: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .btn-complete {
            background: #68d391;
            color: white;
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-del {
            background: #fc8181;
            color: white;
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← Back Home</a>
    <div class="flower-deco">🌼 Daily To-Do List 🌼</div>
    <h1>Add & Complete Daily Activities</h1>

    <div class="card">
        <div class="lock-toggle-wrap">
            <button id="lockToggle" onclick="toggleLockList()">Lock List (Hide Edit Inputs)</button>
        </div>

        <div class="edit-section" id="editInputs">
            <input type="text" id="taskInput" placeholder="Write your daily task (e.g. Study, Exercise)">
            <input type="number" id="taskPointValue" min="1" value="10" placeholder="Points earned when done">
            <button class="btn-add" onclick="addTask()">Add New Task</button>
        </div>

        <div class="task-list" id="taskList"></div>
    </div>

    <script>
        // Date reset system
        const todayDate = new Date().toLocaleDateString();
        let savedDate = localStorage.getItem("lastSavedDate") || "";
        let dailyPoints = parseInt(localStorage.getItem("dailyPoints")) || 0;
        let bankPoints = parseInt(localStorage.getItem("bankPoints")) || 0;
        let tasks = JSON.parse(localStorage.getItem("taskData")) || [];
        let listLocked = localStorage.getItem("taskListLocked") === "true";

        // New day transfer
        if (savedDate !== todayDate) {
            bankPoints += dailyPoints;
            dailyPoints = 0;
            localStorage.setItem("lastSavedDate", todayDate);
            localStorage.setItem("dailyPoints", dailyPoints);
            localStorage.setItem("bankPoints", bankPoints);
            alert(" New day! Yesterday's unused points moved to bank.");
        }

        function toggleLockList() {
            listLocked = !listLocked;
            localStorage.setItem("taskListLocked", listLocked);
            renderLockState();
        }

        function renderLockState() {
            const editWrap = document.getElementById("editInputs");
            const toggleBtn = document.getElementById("lockToggle");
            if (listLocked) {
                editWrap.classList.add("hidden");
                toggleBtn.textContent = "Unlock List (Show Edit Inputs)";
            } else {
                editWrap.classList.remove("hidden");
                toggleBtn.textContent = "Lock List (Hide Edit Inputs)";
            }
        }

        function addTask() {
            const name = document.getElementById("taskInput").value.trim();
            const pts = parseInt(document.getElementById("taskPointValue").value);
            if (!name || isNaN(pts) || pts < 1) return alert("Fill valid task & points!");
            tasks.push({ id: Date.now(), name, points: pts });
            localStorage.setItem("taskData", JSON.stringify(tasks));
            renderTasks();
            document.getElementById("taskInput").value = "";
            document.getElementById("taskPointValue").value = "10";
        }

        function completeTask(id, earnPts) {
            dailyPoints += earnPts;
            localStorage.setItem("dailyPoints", dailyPoints);
            deleteTask(id);
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem("taskData", JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById("taskList");
            container.innerHTML = tasks.length === 0 ? "<p style='text-align:center;color:#557;'>No tasks added yet!</p>" : "";
            tasks.forEach(t => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.innerHTML = `
                    <span>${t.name} (+${t.points} daily pts)</span>
                    <div>
                        <button class="btn-complete" onclick="completeTask(${t.id},${t.points})">Complete</button>
                        <button class="btn-del" onclick="deleteTask(${t.id})">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Init
        renderLockState();
        renderTasks();
    </script>
</body>
</html>
