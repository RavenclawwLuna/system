<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Tracker Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
        }
        body {
            background: #e6f4ff;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b8e0ff' fill-opacity='0.4'%3E%3Cpath d='M30 30c0-3.3-2.7-6-6-6s-6 2.7-6 6 2.7 6 6 6 6-2.7 6-6zm18 0c0-3.3-2.7-6-6-6s-6 2.7-6 6 2.7 6 6 6 6-2.7 6-6zm-36 0c0-3.3-2.7-6-6-6s-6 2.7-6 6 2.7 6 6 6 6-2.7 6-6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }
        /* Falling Snowflakes Animation */
        .snowflake {
            position: fixed;
            top: -10px;
            color: #ffffff;
            font-size: 1rem;
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;
            animation: snowFall linear infinite;
        }
        @keyframes snowFall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        .content-wrap {
            position: relative;
            z-index: 2;
        }
        h1 {
            color: #2b6cb0;
            text-align: center;
            margin-bottom: 2rem;
        }
        .balance-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px #c0e0fb;
            margin-bottom: 1.5rem;
        }
        .daily-balance {
            background: #b8e0ff;
            padding: 1rem;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a5276;
            margin-bottom: 1rem;
        }
        .bank-balance {
            background: #d4eaff;
            padding: 1rem;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #3b4e91;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }
        .nav-btn {
            display: block;
            background: #90cdf4;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 3px 8px #a0d4f7;
            transition: 0.2s ease;
        }
        .nav-btn:hover {
            background: #63b3ed;
            transform: translateY(-3px);
        }
        .note-text {
            text-align: center;
            margin-top: 2rem;
            color: #4a7b9d;
            font-size: 0.95rem;
        }
        @media (max-width:600px) {
            .nav-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="content-wrap">
        <h1>Daily Activity & Reward Bank Tracker</h1>

        <div class="balance-card">
            <div class="daily-balance">Today's Daily Points: <span id="dailyPoints">0</span></div>
            <div class="bank-balance">Saved Bank Points (Long Term): <span id="bankPoints">0</span></div>
        </div>

        <div class="nav-grid">
            <a href="tasks.html" class="nav-btn">Daily To-Do Tasks</a>
            <a href="daily-rewards.html" class="nav-btn">Small Relax Rewards</a>
            <a href="bank-rewards.html" class="nav-btn" style="grid-column: 1/-1;">Big Long-Term Rewards & Shopping</a>
        </div>

        <p class="note-text">Daily unused points automatically save to your point bank every new day. Lock lists to stop editing.</p>
    </div>

    <script>
        // Snowflake Generator
        function createSnowflake() {
            const snow = document.createElement('div');
            snow.classList.add('snowflake');
            snow.textContent = '•';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.fontSize = (Math.random() * 10 + 8) + 'px';
            snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 10000);
        }
        setInterval(createSnowflake, 200);

        // Point Display
        let dailyPoints = parseInt(localStorage.getItem("dailyPoints")) || 0;
        let bankPoints = parseInt(localStorage.getItem("bankPoints")) || 0;
        document.getElementById("dailyPoints").textContent = dailyPoints;
        document.getElementById("bankPoints").textContent = bankPoints;
    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
